name: GitHub Trending AI Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch trending
        run: |
          curl -s 'https://github.com/trending' > trending.html

      - name: Extract AI projects
        run: |
          grep -i 'agent\|ai\|gpt' trending.html | head -20 > result.txt

      - name: Send Email
        run: |
          pip install yagmail
          python3 -m yagmail --user "${{ secrets.EMAIL_USER }}" --password "${{ secrets.EMAIL_PASS }}" --to "${{ secrets.EMAIL_USER }}" --subject "🔥 GitHub AI Trending" --contents-file result.txt
